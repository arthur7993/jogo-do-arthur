<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Arthur 3.0</title>
<style>
body{
    margin:0;
    overflow:hidden;
}
canvas{
    display:block;
    margin:0 auto;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth > 500 ? 400 : window.innerWidth - 20;
canvas.height = 600;

let bird, pipes, score, gameState, highScore;
let speed = 3;
let clouds = [];
let isNight = false;

let jumpSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
let hitSound = new Audio("https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3");

function init(){
    bird = {
        x: 80,
        y: 250,
        radius: 15,
        gravity: 0.6,
        lift: -10,
        velocity: 0
    };

    pipes = [];
    score = 0;
    speed = 3;
    gameState = "start";
    highScore = localStorage.getItem("recorde") || 0;
}

function createPipe(){
    let gap = 160;
    let topHeight = Math.random() * 250 + 50;

    pipes.push({
        x: canvas.width,
        width: 60,
        top: topHeight,
        bottom: canvas.height - topHeight - gap
    });
}

function createCloud(){
    clouds.push({
        x: canvas.width,
        y: Math.random()*200,
        size: Math.random()*30 + 20
    });
}

function drawClouds(){
    ctx.fillStyle="white";
    clouds.forEach(cloud=>{
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI*2);
        ctx.fill();
    });
}

function updateClouds(){
    clouds.forEach(cloud=>{
        cloud.x -= 1;
    });
    clouds = clouds.filter(cloud=>cloud.x > -50);
}

function drawBird(){
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.velocity * 0.05);

    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(0,0,bird.radius,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(25,5);
    ctx.lineTo(15,10);
    ctx.fill();

    ctx.restore();
}

function updateBird(){
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if(bird.y + bird.radius > canvas.height){
        endGame();
    }
}

function drawPipes(){
    ctx.fillStyle="green";
    pipes.forEach(pipe=>{
        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);
    });
}

function updatePipes(){
    pipes.forEach(pipe=>{
        pipe.x -= speed;

        if(
            bird.x + bird.radius > pipe.x &&
            bird.x - bird.radius < pipe.x + pipe.width &&
            (bird.y - bird.radius < pipe.top ||
             bird.y + bird.radius > canvas.height - pipe.bottom)
        ){
            endGame();
        }

        if(pipe.x + pipe.width < 0){
            score++;
            speed += 0.2; // dificuldade aumenta
        }
    });

    pipes = pipes.filter(pipe=>pipe.x + pipe.width > 0);
}

function drawScore(){
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Pontos: "+score,10,30);
    ctx.fillText("Recorde: "+highScore,10,60);
}

function endGame(){
    if(gameState !== "gameover"){
        hitSound.play();
    }
    if(score > highScore){
        highScore = score;
        localStorage.setItem("recorde",highScore);
    }
    gameState = "gameover";
}

function drawStartScreen(){
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("Flappy Arthur 3.0",canvas.width/2-120,250);
    ctx.font="20px Arial";
    ctx.fillText("Toque para começar",canvas.width/2-100,300);
}

function loop(){
    ctx.fillStyle = isNight ? "#001d3d" : "#4ec0ca";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    updateClouds();
    drawClouds();

    if(gameState==="playing"){
        updateBird();
        updatePipes();
    }

    drawBird();
    drawPipes();
    drawScore();

    if(gameState==="start"){
        drawStartScreen();
    }

    if(gameState==="gameover"){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("Game Over",canvas.width/2-100,300);
    }

    requestAnimationFrame(loop);
}

function jump(){
    if(gameState==="start"){
        gameState="playing";
    }
    if(gameState==="playing"){
        bird.velocity = bird.lift;
        jumpSound.play();
    }
    if(gameState==="gameover"){
        init();
    }
}

document.addEventListener("keydown",jump);
document.addEventListener("click",jump);

setInterval(createPipe,2000);
setInterval(createCloud,3000);
setInterval(()=>{ isNight=!isNight; },30000);

init();
loop();
</script>

</body>
</html>
